<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>vocab.ai</title>
<style>
:root{--bg:#f6f8ff;--card:#fff;--text:#111827;--muted:#667085;--line:#e5e7eb;--blue:#2563eb;--green:#067647;--red:#b42318;--soft:#f3f4f6;--amber:#b54708}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#eaf1ff 0,#f8fafc 300px);color:var(--text);line-height:1.5}.wrap{width:min(1120px,92vw);margin:0 auto;padding:28px 0 48px}.nav{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px}.brand{font-weight:950;font-size:1.25rem;letter-spacing:-.04em}.brand span{color:var(--blue)}.nav-actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-wrap:wrap}.pill{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;color:#344054;font-weight:900;font-size:.9rem;cursor:pointer}.pill.active{background:var(--blue);border-color:var(--blue);color:#fff}@media(max-width:860px){.nav{align-items:flex-start;flex-direction:column}.nav-actions{justify-content:flex-start}}.card{background:rgba(255,255,255,.95);border:1px solid var(--line);border-radius:24px;box-shadow:0 18px 50px rgba(17,24,39,.08);padding:22px;margin-bottom:18px}.stack{display:grid;gap:13px}.row{display:flex;gap:10px;flex-wrap:wrap}label{font-weight:900;display:block;margin:0 0 7px}input{width:100%;font:inherit;border:1px solid var(--line);border-radius:15px;background:#fff;color:var(--text);padding:13px 14px;outline:none}input:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(37,99,235,.12)}button{border:0;border-radius:999px;padding:11px 16px;font-weight:950;cursor:pointer;background:var(--blue);color:#fff}button.secondary{background:#fff;color:#111827;border:1px solid var(--line)}button.danger{background:#fff;color:var(--red);border:1px solid #fecaca}button:disabled{opacity:.6;cursor:not-allowed}.status{min-height:24px;margin-top:4px;font-weight:850;color:#475467}.status.ok{color:var(--green)}.status.err{color:var(--red)}.status.warn{color:var(--amber)}.results{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}@media(max-width:760px){.results{grid-template-columns:1fr}}.box{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;min-height:105px}.box-title{font-size:.76rem;font-weight:950;color:#667085;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}.box-value{font-weight:850;white-space:pre-wrap}.meaning{font-size:1.2rem}.history{margin-top:18px}.history-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}.history-list{display:grid;gap:10px}.item{border:1px solid var(--line);border-radius:18px;background:#fff;padding:14px}.item b{font-size:1.05rem}.meta{color:var(--muted);font-size:.85rem;margin-top:4px}.empty{color:var(--muted);border:1px dashed var(--line);border-radius:18px;padding:16px;background:#fff}.hint{color:var(--muted);margin:.25rem 0 0}
</style>
</head>
<body>
<main class="wrap">
  <div class="nav">
    <div class="brand">vocab<span>.ai</span></div>
    <div class="nav-actions" aria-label="Vocabulary sections">
      <button class="pill" type="button" data-mode="One Word Substitution" onclick="setMode('One Word Substitution')">One Word Substitution</button>
      <button class="pill" type="button" data-mode="Idioms" onclick="setMode('Idioms')">Idioms</button>
      <button class="pill active" type="button" data-mode="Antonyms & Synonyms" onclick="setMode('Antonyms & Synonyms')">Antonyms &amp; Synonyms</button>
      <button class="pill" type="button" data-mode="Spellings" onclick="setMode('Spellings')">Spellings</button>
    </div>
  </div>

  <section class="card stack">
    <div>
      <label for="term">Word or phrase</label>
      <input id="term" placeholder="Enter word or phrase" autocomplete="off">
    </div>
    <div class="row">
      <button id="go" onclick="generateEntry()">Generate</button>
      <button class="secondary" onclick="saveCurrent()">Save</button>
      <button class="secondary" onclick="clearEntry()">Clear</button>
    </div>
    <div id="status" class="status"></div>
  </section>

  <section class="card">
    <div class="results">
      <div class="box"><div class="box-title">Section</div><div class="box-value" id="rMode">-</div></div>
      <div class="box"><div class="box-title">Word / Phrase</div><div class="box-value" id="rTerm">-</div></div>
      <div class="box"><div class="box-title">Meaning</div><div class="box-value meaning" id="rMeaning">-</div></div>
      <div class="box"><div class="box-title">Synonyms</div><div class="box-value" id="rSyn">-</div></div>
      <div class="box"><div class="box-title">Antonyms</div><div class="box-value" id="rAnt">-</div></div>
      <div class="box"><div class="box-title">Example</div><div class="box-value" id="rEx">-</div></div>
      <div class="box"><div class="box-title">Example Hindi</div><div class="box-value" id="rExHi">-</div></div>
    </div>
  </section>

  <section class="card history">
    <div class="history-head"><div><h2 style="margin:0">Saved vocabulary revision list</h2><p class="hint">Stored locally in this browser.</p></div><div class="row"><button onclick="savePdf()">Download / Save PDF</button><button class="secondary" onclick="downloadJson()">Download JSON</button><button class="danger" onclick="clearHistory()">Clear</button></div></div>
    <div id="history" class="history-list"></div>
  </section>
</main>
<script>
const KEY='vocab-ai-history-v4';
let current=null,mode='Antonyms & Synonyms';
const $=id=>document.getElementById(id);
const built={
  diligent:{m:'मेहनती',s:['hardworking','industrious'],a:['lazy','careless'],e:'A diligent aspirant revises vocabulary every day.',h:'एक मेहनती अभ्यर्थी हर दिन शब्दावली दोहराता है।'},
  prudent:{m:'समझदार, विवेकपूर्ण',s:['wise','sensible'],a:['foolish','careless'],e:'A prudent candidate reads every option before marking the answer.',h:'एक समझदार अभ्यर्थी उत्तर चुनने से पहले हर विकल्प पढ़ता है।'},
  benevolent:{m:'दयालु, परोपकारी',s:['kind','generous'],a:['cruel','selfish'],e:'The benevolent teacher helped poor students buy books.',h:'दयालु शिक्षक ने गरीब विद्यार्थियों को किताबें खरीदने में मदद की।'},
  obsolete:{m:'पुराना, अप्रचलित',s:['outdated','old-fashioned'],a:['modern','current'],e:'Many obsolete words are no longer used in daily conversation.',h:'कई अप्रचलित शब्द अब दैनिक बातचीत में उपयोग नहीं होते।'},
  mitigate:{m:'कम करना, घटाना',s:['reduce','lessen'],a:['increase','worsen'],e:'Regular revision can mitigate exam fear before the final test.',h:'नियमित पुनरावृत्ति अंतिम परीक्षा से पहले डर को कम कर सकती है।'},
  abundant:{m:'प्रचुर, बहुत अधिक',s:['plentiful','ample'],a:['scarce','limited'],e:'The library has abundant material for government exam preparation.',h:'पुस्तकालय में सरकारी परीक्षा की तैयारी के लिए प्रचुर सामग्री है।'},
  honest:{m:'ईमानदार',s:['truthful','sincere'],a:['dishonest','false'],e:'An honest officer does not misuse public money.',h:'एक ईमानदार अधिकारी सार्वजनिक धन का दुरुपयोग नहीं करता।'},
  brave:{m:'बहादुर, साहसी',s:['courageous','fearless'],a:['cowardly','fearful'],e:'The brave constable rescued the child from the burning house.',h:'बहादुर सिपाही ने बच्चे को जलते हुए घर से बचाया।'}
};
function status(t,c=''){let el=$('status');el.textContent=t;el.className='status '+c}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function uniq(a){return[...new Set((a||[]).map(x=>typeof x==='string'?x:x.word).filter(Boolean).map(x=>x.trim().toLowerCase()).filter(Boolean))]}
function cleanTwo(arr){let v=uniq(arr).filter(x=>x.length>2 && !/^[a-z]{1,2}$/.test(x)).slice(0,2);return v.length?v:['Not available automatically']}
async function json(url){let r=await fetch(url);if(!r.ok)throw Error('fetch');return r.json()}
async function hi(text){try{let j=await json('https://api.mymemory.translated.net/get?q='+encodeURIComponent(text)+'&langpair=en|hi');return (j.responseData&&j.responseData.translatedText||'').trim()}catch(e){return''}}
async function words(term,rel){try{return uniq(await json('https://api.datamuse.com/words?'+rel+'='+encodeURIComponent(term)+'&max=10'))}catch(e){return[]}}
function smartFallbackExample(term,pos=''){let t=term.trim(),l=t.toLowerCase();let days={monday:'The exam centre will remain open on Monday for document verification.',tuesday:'The admit card correction window closes on Tuesday.',wednesday:'The commission released the revised answer key on Wednesday.',thursday:'The aspirant attended a mock test on Thursday.',friday:'The application form must be submitted by Friday.',saturday:'The library remains open on Saturday for revision.',sunday:'Many aspirants revise previous year questions on Sunday.'};if(days[l])return days[l];if(mode==='Idioms')return 'The candidate used "'+t+'" correctly while explaining the situation.';if(mode==='One Word Substitution')return 'The examiner asked for one word that accurately expresses "'+t+'".';if(mode==='Spellings')return 'The candidate wrote "'+t+'" correctly in the answer sheet.';if(pos==='verb')return 'Regular practice helps aspirants '+t+' their performance before the exam.';if(pos==='noun')return 'The '+t+' was clearly explained during the revision class.';if(pos==='adjective'||pos==='adverb')return 'The aspirant remained '+t+' while solving a difficult question.';return 'The aspirant used "'+t+'" correctly in an exam-style sentence.'}
async function example(term){if(term.includes(' '))return smartFallbackExample(term);try{let j=await json('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(term));let pos='';for(let m of j[0].meanings||[]){pos=pos||m.partOfSpeech||'';for(let d of m.definitions||[]){let ex=(d.example||'').trim();if(ex&&ex.length<160&&!/^["']?\w+["']?\s+means/i.test(ex))return ex}}return smartFallbackExample(term,pos)}catch(e){return smartFallbackExample(term)}}
function setMode(next){mode=next;document.querySelectorAll('.pill').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));$('term').placeholder='Enter word or phrase'}
async function generateEntry(){let term=$('term').value.trim();if(!term){status('Enter a word or phrase first.','err');return}let key=term.toLowerCase();$('go').disabled=true;status('Generating revision entry...','warn');try{let data;if(built[key]){let b=built[key];data={mode,term,meaning:b.m,synonyms:b.s,antonyms:b.a,example:b.e,exampleHindi:b.h,date:new Date().toLocaleString()}}else{let [meaning,syn,ant,ex]=await Promise.all([hi(term),words(term,'rel_syn'),words(term,'rel_ant'),example(term)]);let exHi=await hi(ex);data={mode,term,meaning:meaning||'Hindi meaning not found automatically',synonyms:cleanTwo(syn),antonyms:cleanTwo(ant),example:ex,exampleHindi:exHi||'Hindi translation not found automatically',date:new Date().toLocaleString()}}current=data;renderResult(data);status('Generated. Click Save to add it to revision list.','ok')}catch(e){status('Lookup failed. Try another word or phrase.','err')}finally{$('go').disabled=false}}
function renderResult(d){$('rMode').textContent=d.mode||mode;$('rTerm').textContent=d.term;$('rMeaning').textContent=d.meaning;$('rSyn').textContent=d.synonyms.join(', ');$('rAnt').textContent=d.antonyms.join(', ');$('rEx').textContent=d.example;$('rExHi').textContent=d.exampleHindi}
function clearEntry(){current=null;$('term').value='';['rMode','rTerm','rMeaning','rSyn','rAnt','rEx','rExHi'].forEach(id=>$(id).textContent='-');status('', '');$('term').focus()}
function history(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){return[]}}
function setHistory(a){localStorage.setItem(KEY,JSON.stringify(a));renderHistory()}
function saveCurrent(){if(!current){status('Generate an entry first.','err');return}let a=history().filter(x=>(x.mode+'|'+x.term).toLowerCase()!=(current.mode+'|'+current.term).toLowerCase());a.unshift(current);setHistory(a);status('Saved for revision.','ok')}
function renderHistory(){let a=history(),el=$('history');if(!a.length){el.innerHTML='<div class="empty">No saved lookups yet. Generate a word and click Save to start your revision list.</div>';return}el.innerHTML=a.map((x,i)=>'<div class="item"><b>'+(i+1)+'. '+esc(x.term)+'</b><div class="meta">'+esc(x.mode)+' | '+esc(x.date||'')+'</div><div>Hindi: '+esc(x.meaning)+'</div><div>Synonyms: '+esc((x.synonyms||[]).join(', '))+'</div><div>Antonyms: '+esc((x.antonyms||[]).join(', '))+'</div><div>Example: '+esc(x.example)+'</div><div>Example Hindi: '+esc(x.exampleHindi)+'</div></div>').join('')}
function clearHistory(){if(confirm('Delete all saved vocabulary entries from this browser?'))setHistory([])}
function downloadJson(){let blob=new Blob([JSON.stringify(history(),null,2)],{type:'application/json'});download(blob,'vocab-ai-history.json')}
function download(blob,name){let u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u)}
function savePdf(){let a=history();if(!a.length){status('No saved entries to download.','err');return}let rows=a.map((d,i)=>`<section><h2>${i+1}. ${esc(d.term)}</h2><p><b>Section:</b> ${esc(d.mode)}</p><p><b>Hindi Meaning:</b> ${esc(d.meaning)}</p><p><b>Synonyms:</b> ${esc((d.synonyms||[]).join(', '))}</p><p><b>Antonyms:</b> ${esc((d.antonyms||[]).join(', '))}</p><p><b>Example:</b> ${esc(d.example)}</p><p><b>Example Hindi:</b> ${esc(d.exampleHindi)}</p></section>`).join('');let w=window.open('','_blank');w.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>vocab.ai Revision PDF</title><style>body{font-family:Arial,Noto Sans Devanagari,Nirmala UI,sans-serif;margin:28px;color:#111}h1{margin:0 0 4px}small{color:#555}section{break-inside:avoid;border-bottom:1px solid #ddd;padding:12px 0}h2{font-size:18px;margin:0 0 8px}p{margin:5px 0}@media print{button{display:none}}</style></head><body><button onclick="window.print()">Save as PDF</button><h1>Vocabulary Revision - vocab.ai</h1><small>Saved entries from your browser</small>${rows}<script>setTimeout(()=>window.print(),400)<\/script></body></html>`);w.document.close();status('PDF window opened. Choose Save as PDF.','ok')}
$('term').addEventListener('keydown',e=>{if(e.key==='Enter')generateEntry()});renderHistory();
</script>
</body>
</html>
